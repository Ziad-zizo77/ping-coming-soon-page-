<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="keywords"
      content="Frontend-Mentor Challenge ping-coming-soon-page"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <title>Frontend Mentor | Ping coming soon page</title>
    <!-- Adding Main Css -->
    <link rel="stylesheet" href="assets/css/style.css" />
    <!-- Adding Font Google -->
    <link
      href="https://fonts.googleapis.com/css?family=Libre+Franklin:300,600,700,300italic,600italic,700italic"
      rel="stylesheet"
    />
  </head>
  <body>
    <main class="container">
      <img src="assets/images/logo.svg" alt="Ping Logo" class="logo" />
      <div class="text-content">
        <h1 class="title">We are launching <span>soon!</span></h1>
        <p class="subscribe">Subscribe and get notified</p>
      </div>
      <form action="#" id="form" class="email-form">
        <input type="text" class="email" placeholder="Your email address" />
        <p class="msg-error">Please provide a valid email address</p>
        <button type="submit" class="btn-submit" id="submitBtn">
          Notify Me
        </button>
      </form>
      <img
        src="assets/images/illustration-dashboard.png"
        alt="Dashboard Image"
        class="dashboard"
      />
      <ul class="social">
        <li>
          <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
        </li>
        <li>
          <a href="#"><i class="fa-brands fa-twitter"></i></a>
        </li>
        <li>
          <a href="#"><i class="fa-brands fa-instagram"></i></a>
        </li>
      </ul>
      <footer class="footer">
        &copy; Copyright Ping. All rights reserved.
      </footer>
    </main>
    <!-- Adding Font Awesome -->
    <script src="assets/js/fontawesome.min.js"></script>
    <script src="assets/js/brands.min.js"></script>
    <!-- Adding Sweet Alert 2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Adding Main Js File -->
    <script src="assets/js/main.js"></script>
  </body>
</html>
